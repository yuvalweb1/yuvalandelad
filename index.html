<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ChatWrapped — Your WhatsApp Year</title>
    <meta name="description" content="A cinematic recap of your WhatsApp group chat. Eras. Awards. Drama. 100% on-device — nothing leaves your phone." />

    <!-- Open Graph -->
    <meta property="og:title" content="ChatWrapped — Your WhatsApp Year" />
    <meta property="og:description" content="A cinematic recap built from your real messages. Nothing leaves your phone." />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChatWrapped — Your WhatsApp Year" />
    <meta name="twitter:description" content="A cinematic recap built from your real messages. Nothing leaves your phone." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Caveat:wght@500;600;700&family=DM+Sans:wght@400;500&family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        /* ===== Ultra-Pop Social palette ===== */
        /* Primary backgrounds — joyful & energetic */
        --pop-banana: #FFD700;
        --pop-mango:  #FF8C00;
        /* High-contrast typography & card backgrounds */
        --pop-eggplant: #4A0E4E;
        --pop-navy:     #0A192F;
        /* Accents & calls-to-action */
        --pop-sky:  #00BFFF;
        --pop-pink: #FF69B4;

        /* Semantic roles */
        --bg-joyful: var(--pop-banana);
        --bg-energetic: var(--pop-mango);
        --ink: var(--pop-eggplant);
        --ink-alt: var(--pop-navy);
        --card-bg: var(--pop-eggplant);
        --card-bg-alt: var(--pop-navy);
        --cta: var(--pop-sky);
        --cta-2: var(--pop-pink);

        /* Background orbs (BlobBackground) repointed to the new palette */
        --amber-gold: var(--pop-banana);
        --blaze-orange: var(--pop-mango);
        --neon-pink: var(--pop-pink);
        --blue-violet: var(--pop-sky);
        --azure-blue: var(--pop-mango);
      }
      html, body, #root { height: 100%; margin: 0; padding: 0; background: #0a0a0f; }
      body {
        font-family: 'DM Sans', 'Comix CLM', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #f4f4f8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
      }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
